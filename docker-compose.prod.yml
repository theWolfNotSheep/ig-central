# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# For scaling api and web (2 replicas each), use --scale since the base
# docker-compose.yml sets container_name which conflicts with replicas:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale api=2 --scale web=2
#
# Adds resource limits, restart policies, and production profiles.

services:
  cloudflared:
    restart: always

  mongo:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

  minio:
    restart: always
    # Note: ports 9000/9001 inherited from base. Override with empty ports
    # in a separate profile or remove from base if not needed externally.
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  elasticsearch:
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

  rabbitmq:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  bert-classifier:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  api:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker,production
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8080"
      APP_ENV: PRODUCTION
      PUBLIC_URL: ${PUBLIC_URL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.office365.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@governanceledstore.co.uk}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      GIT_HUB_CLIENT_ID: ${GIT_HUB_CLIENT_ID:-}
      GIT_HUB_CLIENT_SECRET: ${GIT_HUB_CLIENT_SECRET:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-igc-documents}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      GOVERNANCE_HUB_URL: http://governance-hub:8090
      GOVERNANCE_HUB_API_KEY: ${GOVERNANCE_HUB_API_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${PUBLIC_URL}/api/drives/google/callback
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PIPELINE_BERT_SERVICE_URL: http://bert-classifier:8000
      LLM_SERVICE_URL: http://llm-worker:8082
      LLM_TIMEOUT_MS: "300000"
    deploy:
      # Use --scale api=2 at deploy time (container_name in base prevents replicas here)
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  mcp-server:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker,production
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  llm-worker:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker,production
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 768M

  web:
    restart: always
    deploy:
      # Use --scale web=2 at deploy time (container_name in base prevents replicas here)
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  web-hub:
    restart: always

  hub-mongo:
    restart: always

  governance-hub:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker,production
