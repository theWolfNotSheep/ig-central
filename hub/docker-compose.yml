# Governance Hub — standalone stack
# Serves hub.igcentral.com via its own Cloudflare tunnel and Docker network.
#
# Requires:
#   HUB_TUNNEL_TOKEN — Cloudflare tunnel token for hub.igcentral.com
#   HUB_MONGO_PASSWORD
#   HUB_ADMIN_USERNAME (default: admin)
#   HUB_ADMIN_PASSWORD (default: ChangeMe123!)
#
# Run from this directory:
#   docker compose up --build -d

networks:
  hub:
    name: hub-net
    driver: bridge

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  hub-mongo:
    image: mongo:7
    container_name: hub-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${HUB_MONGO_PASSWORD:-hubpassword123}
    volumes:
      - ./data/hub-mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    networks:
      - hub

  governance-hub:
    container_name: governance-hub
    restart: unless-stopped
    build:
      context: ../backend
      dockerfile: Dockerfile.hub
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${HUB_MONGO_PASSWORD:-hubpassword123}@hub-mongo:27017/governance_hub?authSource=admin
      SERVER_PORT: "8090"
      HUB_ADMIN_USERNAME: ${HUB_ADMIN_USERNAME:-admin}
      HUB_ADMIN_PASSWORD: ${HUB_ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      hub-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/actuator/info"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - hub

  web-hub:
    container_name: web-hub
    restart: unless-stopped
    build:
      context: ../web-hub
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HUB_URL: ""
    environment:
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      governance-hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - hub

  nginx:
    image: nginx:alpine
    container_name: hub-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8091:80"
    depends_on:
      governance-hub:
        condition: service_healthy
      web-hub:
        condition: service_healthy
    logging: *default-logging
    networks:
      - hub

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hub-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${HUB_TUNNEL_TOKEN}
    depends_on:
      - nginx
    logging: *default-logging
    networks:
      - hub
