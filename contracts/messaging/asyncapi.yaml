asyncapi: 3.0.0
info:
  title: ig-central — Messaging
  version: 0.3.0
  contact:
    name: ig-central engineering
    url: https://github.com/theWolfNotSheep/ig-central
  description: |
    AsyncAPI 3.0 specification for the RabbitMQ topology used by
    ig-central. Single source of truth for every exchange, queue,
    routing key, and message envelope on the bus.

    **Currently in production:**
    - `gls.documents` topic exchange — document lifecycle events.
    - `gls.pipeline` topic exchange — async LLM job dispatch and
      completion.

    **Forward-looking** (declared in `version-2-implementation-plan.md`
    but not yet wired in code; will land in their respective phases):

    - `gls.audit.*` — audit tier channels. Per CSV #3 / #4 / #5.
      Declared in `contracts/audit/asyncapi.yaml`; the publisher side
      lives in the `gls-platform-audit` library's outbox-relay (see
      Phase 0.7).
    - `gls.config.changed` — cache invalidation per CSV #30.
      Channel + payload schema declared here (0.3.0); the publisher /
      dispatcher / cache primitive ship in the `gls-platform-config`
      shared library (Phase 0.8). `AppConfigService` and the MCP
      governance cache migrate as separate follow-ups.

    **Listener-stub policy** (per `messaging/README.md`):
    - This file is *validated* in pre-commit + CI (via `@asyncapi/cli`).
    - Listener stubs are *not* generated — `@RabbitListener` annotations
      are hand-written in each consumer.
    - The contract → code mapping is documented in each consumer's
      class-level Javadoc.

servers:
  rabbitmq:
    host: 'rabbitmq:5672'
    protocol: amqp
    protocolVersion: '0.9.1'
    description: |
      RabbitMQ broker. In Docker Compose, addressable as
      `rabbitmq:5672`. Auth flows via Spring AMQP credentials in
      `spring.rabbitmq.*` (typically `guest:guest` in dev,
      per-deployment in prod). Service-account JWTs (CSV #18) are
      *not* used on AMQP connections — that scheme is HTTP-only.

channels:
  documentIngested:
    address: 'document.ingested'
    description: |
      Routing key on exchange `gls.documents` (topic). Bound to queue
      `gls.documents.ingested`. Failed messages are rejected (no
      requeue) and routed to `gls.documents.dlx`.

      **Producers:** `DocumentController`, `EmailIngestionService`,
      `GoogleDriveFolderMonitor`, `StaleDocumentRecoveryTask`.
      **Consumer:** `DocumentProcessingPipeline` (in
      `gls-document-processing`).
    messages:
      documentIngestedMessage:
        $ref: '#/components/messages/DocumentIngested'

  documentProcessed:
    address: 'document.processed'
    description: |
      Routing key on `gls.documents`. Bound to queue
      `gls.documents.processed`.

      **Producer:** `DocumentProcessingPipeline` after Tika extraction
      and PII scan complete. **Consumer:** `ClassificationPipeline`
      (in `gls-llm-orchestration`).
    messages:
      documentProcessedMessage:
        $ref: '#/components/messages/DocumentProcessed'

  documentClassified:
    address: 'document.classified'
    description: |
      Routing key on `gls.documents`. Bound to queue
      `gls.documents.classified`.

      **Producer:** `ClassificationPipeline` after a classification
      result is produced. **Consumers:**
      `ClassificationEnforcementConsumer` (always);
      `PipelineExecutionConsumer` (when the engine is running in the
      pipeline-resume mode that uses this channel);
      `gls-indexing-worker` (Phase 1.11) — writes searchable fields
      + `extractedMetadata` to Elasticsearch. See
      `contracts/indexing-worker/`. Each consumer binds its own queue
      so the broker fans out the event to all of them.
    messages:
      documentClassifiedMessage:
        $ref: '#/components/messages/DocumentClassified'

  documentClassificationFailed:
    address: 'document.classification.failed'
    description: |
      Routing key on `gls.documents`. Bound to queue
      `gls.documents.classification.failed`. Currently published on
      terminal LLM-pipeline failure but not actively consumed by
      application code — the DLX backstop catches it. A future
      `gls-audit-collector` consumer will subscribe here for
      Tier 1 / Tier 2 emission (per CSV #5).

  llmJobRequested:
    address: 'pipeline.llm.requested'
    description: |
      Routing key on exchange `gls.pipeline` (topic). Bound to queue
      `gls.pipeline.llm.jobs`. DLX routes to `pipeline.dlq`. Consumer
      prefetch is limited (2 on `gls-llm-orchestration`, 5 elsewhere)
      to avoid overwhelming Anthropic / Ollama.

      **Producer:** `PipelineExecutionEngine` when an async LLM node
      is reached. **Consumer:** `ClassificationPipeline.onLlmJobRequested`.
    messages:
      llmJobRequestedMessage:
        $ref: '#/components/messages/LlmJobRequested'

  llmJobCompleted:
    address: 'pipeline.llm.completed'
    description: |
      Routing key on `gls.pipeline`. Bound to queue
      `gls.pipeline.llm.completed`.

      **Producer:** `ClassificationPipeline.publishJobCompleted`
      (success or failure). **Consumer:** `PipelineResumeConsumer`,
      which resumes pipeline execution.
    messages:
      llmJobCompletedMessage:
        $ref: '#/components/messages/LlmJobCompleted'

  pipelineResume:
    address: 'pipeline.resume'
    description: |
      Routing key on `gls.pipeline`. Declared but **not** actively
      published or consumed in current code — the engine resumes via
      `pipeline.llm.completed` directly. Kept for forward
      compatibility with a future split between completion and resume.

  configChanged:
    address: 'config.changed'
    description: |
      Routing key on exchange `gls.config` (topic). Cache-invalidation
      fanout: every write to a governance entity (taxonomy, PII patterns,
      retention schedules, sensitivity definitions, metadata schemas,
      storage tiers, traits, governance policies, pipeline blocks) fires
      one of these so all replicas drop the relevant cache entries.

      **Producer convention.** Both local writes (admin UI, API mutations)
      and Hub-driven imports (`PackImportService`) MUST publish — the
      contract is a single channel, no matter where the change came from.
      Per CSV #30, this replaces the existing MCP Caffeine TTL cache for
      governance entities.

      **Consumer convention.** Every replica subscribes via a
      *non-durable, exclusive* queue with auto-generated name (each
      replica gets its own copy of every event). The `gls-platform-config`
      shared library's `ConfigChangeDispatcher` does this automatically
      and routes to registered `ConfigCache` instances by `entityType`.

      **DLX:** none — invalidation events are inherently retryable and a
      missed event is a transient correctness gap, not a fatal bug. The
      next write fixes it.
    messages:
      configChangedMessage:
        $ref: '#/components/messages/ConfigChanged'

  documentsDeadLetter:
    address: '#'
    description: |
      Fanout from `gls.documents.dlx` into queue `gls.documents.dlq`.
      Catches rejected messages from any of the document-domain
      queues. Not actively consumed by application code; inspected
      via the admin monitoring page or RabbitMQ management UI.

  pipelineDeadLetter:
    address: 'pipeline.dlq'
    description: |
      Bound to queue `gls.pipeline.dlq` from `gls.pipeline`. Catches
      rejected messages from the pipeline-domain queues. Not actively
      consumed.

operations:
  publishDocumentIngested:
    action: send
    channel:
      $ref: '#/channels/documentIngested'
    summary: Publish a document-ingested event from any upload path.
    messages:
      - $ref: '#/channels/documentIngested/messages/documentIngestedMessage'

  consumeDocumentIngested:
    action: receive
    channel:
      $ref: '#/channels/documentIngested'
    summary: |
      `DocumentProcessingPipeline` consumes a document-ingested event,
      runs Tika extraction and PII scan, then publishes
      `document.processed`. Failures: rejected (no requeue) → DLX.
    messages:
      - $ref: '#/channels/documentIngested/messages/documentIngestedMessage'

  publishDocumentProcessed:
    action: send
    channel:
      $ref: '#/channels/documentProcessed'
    summary: Publish a document-processed event after extraction.
    messages:
      - $ref: '#/channels/documentProcessed/messages/documentProcessedMessage'

  consumeDocumentProcessed:
    action: receive
    channel:
      $ref: '#/channels/documentProcessed'
    summary: |
      `ClassificationPipeline` consumes the processed event, runs the
      LLM classification (or its async sibling via `pipeline.llm.requested`),
      and publishes `document.classified`.
    messages:
      - $ref: '#/channels/documentProcessed/messages/documentProcessedMessage'

  publishDocumentClassified:
    action: send
    channel:
      $ref: '#/channels/documentClassified'
    summary: Publish the final classification result.
    messages:
      - $ref: '#/channels/documentClassified/messages/documentClassifiedMessage'

  consumeDocumentClassified:
    action: receive
    channel:
      $ref: '#/channels/documentClassified'
    summary: |
      Consumed by `ClassificationEnforcementConsumer` for governance
      enforcement, (in some pipeline modes) by
      `PipelineExecutionConsumer`, and (Phase 1.11 onward) by
      `gls-indexing-worker` for Elasticsearch indexing.
    messages:
      - $ref: '#/channels/documentClassified/messages/documentClassifiedMessage'

  publishLlmJobRequested:
    action: send
    channel:
      $ref: '#/channels/llmJobRequested'
    summary: |
      Published by `PipelineExecutionEngine` when reaching an async
      LLM node.
    messages:
      - $ref: '#/channels/llmJobRequested/messages/llmJobRequestedMessage'

  consumeLlmJobRequested:
    action: receive
    channel:
      $ref: '#/channels/llmJobRequested'
    summary: |
      `ClassificationPipeline.onLlmJobRequested` performs the LLM call
      (Anthropic or Ollama backend, selected by SLM block config)
      and publishes `pipeline.llm.completed`.
    messages:
      - $ref: '#/channels/llmJobRequested/messages/llmJobRequestedMessage'

  publishLlmJobCompleted:
    action: send
    channel:
      $ref: '#/channels/llmJobCompleted'
    summary: Published by the LLM worker when an async job finishes.
    messages:
      - $ref: '#/channels/llmJobCompleted/messages/llmJobCompletedMessage'

  consumeLlmJobCompleted:
    action: receive
    channel:
      $ref: '#/channels/llmJobCompleted'
    summary: |
      `PipelineResumeConsumer` resumes pipeline execution from the
      pending node.
    messages:
      - $ref: '#/channels/llmJobCompleted/messages/llmJobCompletedMessage'

  publishConfigChanged:
    action: send
    channel:
      $ref: '#/channels/configChanged'
    summary: |
      Any service mutating a governance entity publishes a
      `ConfigChangedEvent` so peer replicas drop their cache entries.
      `gls-platform-config` library's `ConfigChangePublisher` is the
      single emitter — services don't call `RabbitTemplate.convertAndSend`
      for this directly.
    messages:
      - $ref: '#/channels/configChanged/messages/configChangedMessage'

  consumeConfigChanged:
    action: receive
    channel:
      $ref: '#/channels/configChanged'
    summary: |
      Every replica binds a non-durable exclusive queue to
      `gls.config` so it receives every invalidation. The
      `gls-platform-config` library's `ConfigChangeDispatcher` consumes
      and routes to registered `ConfigCache` instances by `entityType`.
    messages:
      - $ref: '#/channels/configChanged/messages/configChangedMessage'

components:
  messages:
    DocumentIngested:
      name: DocumentIngestedEvent
      title: Document ingested into the pipeline.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DocumentIngestedEvent'

    DocumentProcessed:
      name: DocumentProcessedEvent
      title: Document text extraction + PII scan complete.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DocumentProcessedEvent'

    DocumentClassified:
      name: DocumentClassifiedEvent
      title: Document classified by the LLM (or cascade tier).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DocumentClassifiedEvent'

    LlmJobRequested:
      name: LlmJobRequestedEvent
      title: Async LLM job requested by the pipeline engine.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/LlmJobRequestedEvent'

    LlmJobCompleted:
      name: LlmJobCompletedEvent
      title: Async LLM job completed (success or failure).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/LlmJobCompletedEvent'

    ConfigChanged:
      name: ConfigChangedEvent
      title: Cache-invalidation event for a governance entity write.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ConfigChangedEvent'

  schemas:
    DocumentIngestedEvent:
      type: object
      description: |
        Published when a document enters the pipeline. Java record:
        `co.uk.wolfnotsheep.document.events.DocumentIngestedEvent`.
      required: [documentId, fileName, mimeType, fileSizeBytes, ingestedAt, pipelineId]
      properties:
        documentId:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
          format: int64
          minimum: 0
        storageBucket:
          type: string
          description: MinIO bucket for the original upload.
        storageKey:
          type: string
          description: Object key within the bucket.
        uploadedBy:
          type: string
          description: Username (or service identity) of the uploader.
        ingestedAt:
          type: string
          format: date-time
        pipelineId:
          type: string
          description: |
            Selected `PipelineDefinition` id for this document — chosen
            at ingest time based on routing rules.

    DocumentProcessedEvent:
      type: object
      description: |
        Published after Tika extraction and PII scan. Java record:
        `co.uk.wolfnotsheep.document.events.DocumentProcessedEvent`.
      required: [documentId, fileName, mimeType, fileSizeBytes, processedAt]
      properties:
        documentId:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
          format: int64
        extractedText:
          type: string
          description: |
            Plain text from Tika. Currently inline in the message
            envelope. A future migration may switch to the
            `_shared/text-payload` `oneOf` pattern (CSV #19) so large
            extractions don't bloat AMQP frames.
        storageLocation:
          type: string
          description: Original storage location (bucket + key encoded as a path).
        uploadedBy:
          type: string
        processedAt:
          type: string
          format: date-time
        piiFindings:
          type: array
          description: |
            Lightweight PII summary for the LLM. Raw matched text is
            never published — only the redacted form, the type, the
            confidence, and the detection method.
          items:
            $ref: '#/components/schemas/PiiSummaryEntry'

    PiiSummaryEntry:
      type: object
      required: [type, redactedText, confidence, method]
      properties:
        type:
          type: string
          description: PII type identifier (e.g. `EMAIL`, `NHS_NUMBER`).
        redactedText:
          type: string
          description: Matched text with sensitive characters redacted.
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
        method:
          type: string
          description: Detection method (e.g. `REGEX`, `LLM`).

    DocumentClassifiedEvent:
      type: object
      description: |
        Published when classification produces a result. Java record:
        `co.uk.wolfnotsheep.document.events.DocumentClassifiedEvent`.
      required: [documentId, classificationResultId, classifiedAt]
      properties:
        documentId:
          type: string
        classificationResultId:
          type: string
        categoryId:
          type: string
        categoryName:
          type: string
        sensitivityLabel:
          type: string
          description: |
            Sensitivity level. Mirrors `SensitivityLabel` enum in
            `gls-governance` (e.g. `PUBLIC`, `INTERNAL`,
            `CONFIDENTIAL`, `RESTRICTED`).
        tags:
          type: array
          items:
            type: string
        applicablePolicyIds:
          type: array
          items:
            type: string
        retentionScheduleId:
          type: string
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
        requiresHumanReview:
          type: boolean
          description: |
            Whether the document was routed to the review queue.
            Drives the `REVIEW_REQUIRED` status transition in
            `ClassificationEnforcementConsumer`.
        classifiedAt:
          type: string
          format: date-time

    LlmJobRequestedEvent:
      type: object
      description: |
        Published when the engine reaches an async LLM node. Java
        record: `co.uk.wolfnotsheep.document.events.LlmJobRequestedEvent`.
      required: [jobId, pipelineRunId, nodeRunId, documentId, mode]
      properties:
        jobId:
          type: string
        pipelineRunId:
          type: string
        nodeRunId:
          type: string
        documentId:
          type: string
        nodeKey:
          type: string
          description: Identifier of the pipeline node within its run.
        mode:
          type: string
          enum: [CLASSIFICATION, CUSTOM_PROMPT]
        blockId:
          type: string
        blockVersion:
          type: integer
          format: int32
          description: |
            Pinned block version (CSV #14). When null, the active
            version of the named block is used at dispatch time.
        pipelineId:
          type: string
        extractedText:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        fileSizeBytes:
          type: integer
          format: int64
        uploadedBy:
          type: string
        idempotencyKey:
          type: string
          description: |
            Generated `nodeRun:<run-id>` token. Aligns with the HTTP
            `Idempotency-Key` convention (CSV #16) so HTTP and AMQP
            idempotency share one key space.

    LlmJobCompletedEvent:
      type: object
      description: |
        Published when an LLM job finishes. Carries either the
        successful result or an `error` string. Java record:
        `co.uk.wolfnotsheep.document.events.LlmJobCompletedEvent`.
      required: [jobId, pipelineRunId, nodeRunId, success, completedAt]
      properties:
        jobId:
          type: string
        pipelineRunId:
          type: string
        nodeRunId:
          type: string
        success:
          type: boolean
        classificationResultId:
          type: string
        categoryId:
          type: string
        categoryName:
          type: string
        sensitivityLabel:
          type: string
        tags:
          type: array
          items:
            type: string
        confidence:
          type: number
          format: double
        requiresHumanReview:
          type: boolean
        retentionScheduleId:
          type: string
        applicablePolicyIds:
          type: array
          items:
            type: string
        extractedMetadata:
          type: object
          additionalProperties: true
          description: |
            Free-form per-schema metadata extracted by the LLM. Validated
            against `MetadataSchema` records at dispatch time.
        customResult:
          type: object
          additionalProperties: true
          description: Free-form result for `CUSTOM_PROMPT` mode.
        error:
          type: string
          description: Error message; present when `success=false`.
        completedAt:
          type: string
          format: date-time

    ConfigChangedEvent:
      type: object
      description: |
        Published when a governance entity (taxonomy, PII patterns,
        retention schedule, sensitivity definition, metadata schema,
        storage tier, trait, governance policy, pipeline block, etc.)
        is mutated. Every replica with the matching `entityType`
        cache invalidates the listed entries. Empty `entityIds` is the
        bulk signal — invalidate the whole cache for that type.

        Java record:
        `co.uk.wolfnotsheep.platformconfig.event.ConfigChangedEvent`.
      required:
        - entityType
        - changeType
        - timestamp
        - actor
      additionalProperties: false
      properties:
        entityType:
          type: string
          description: |
            Uppercase snake-case identifier for the entity family
            (e.g. `TAXONOMY`, `POLICY`, `PII_PATTERN_SET`,
            `RETENTION_SCHEDULE`, `METADATA_SCHEMA`,
            `STORAGE_TIER`, `TRAIT`, `BLOCK`).
          minLength: 1
          maxLength: 64
        entityIds:
          type: array
          description: |
            Specific entity IDs that changed. Empty array (or omitted)
            means "everything of this type" — bulk import, schema
            migration, or wildcard refresh.
          items:
            type: string
          default: []
        changeType:
          type: string
          enum: [CREATED, UPDATED, DELETED]
          description: |
            Cache treats all three identically (invalidate the entry).
            The distinction matters for downstream listeners that aren't
            caches — e.g. metric counters or audit pipelines.
        timestamp:
          type: string
          format: date-time
          description: RFC 3339 producer-side timestamp.
        actor:
          type: string
          description: |
            Service identifier that fired the event (e.g.
            `gls-app-assembly`, `gls-governance-hub`).
        traceparent:
          type: string
          description: W3C trace context per CSV #20; optional.
          pattern: '^[0-9a-f]{2}-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
