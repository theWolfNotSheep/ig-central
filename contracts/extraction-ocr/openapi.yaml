openapi: 3.1.1
info:
  title: ig-central — Extraction (OCR)
  version: 0.1.0
  contact:
    name: ig-central engineering
    url: https://github.com/theWolfNotSheep/ig-central
  description: |
    Synchronous OCR. Pulls bytes from MinIO, runs Tesseract via
    Tess4J (CSV #45), returns text inline (≤ 256 KB) or by reference
    (`textRef`) per CSV #19. Per-request language hints select
    Tesseract's language packs.

    Third per-service spec (Phase 1.1). Clones the pattern from
    `contracts/extraction/openapi.yaml` (Tika reference) — same
    response shape, OCR-specific request fields and error codes.

    **Conventions referenced from `_shared/`:**
    - Error envelope (RFC 7807 + extensions) — CSV #17.
    - Service-account JWT — CSV #18.
    - `traceparent` + `Idempotency-Key` headers — CSV #16 / #20.
    - `TextPayload` (inline-vs-`textRef`) — CSV #19.
    - `Capabilities` shape — CSV #21.

    **Supported mime types** (initial scope):
    - `image/png`, `image/jpeg`, `image/tiff`, `image/bmp`
    - `application/pdf` — image-only / scanned PDFs (text-extractable
      PDFs go to `gls-extraction-tika` per the orchestrator's mime
      routing).

servers:
  - url: http://gls-extraction-ocr:8080
    description: Internal Docker Compose hostname.
  - url: http://localhost:8091
    description: Local dev (override).

tags:
  - name: extraction
    description: OCR text extraction operations.
  - name: meta
    description: Capabilities + health.

security:
  - serviceJwt: []

paths:
  /v1/extract:
    post:
      operationId: extractOcr
      tags: [extraction]
      summary: Run OCR over an image or scanned PDF and return text.
      description: |
        Synchronous endpoint. Caller supplies a `documentRef` pointing
        at a MinIO image / scanned-PDF object plus the `nodeRunId` that
        owns this extraction. Service streams the bytes, runs Tesseract,
        and returns either:

        - `kind=inline` with the extracted text in `text` (≤ 256 KB), or
        - `kind=ref` with a `textRef` pointing at a MinIO object holding
          the extracted text (> 256 KB).

        **Languages.** Optional `languages` array selects the Tesseract
        language packs to load (e.g. `["eng", "fra"]`). Default `eng`.
        Unrecognised language codes return 422.

        **Idempotency:** repeated requests with the same `nodeRunId`
        within the 24h TTL window return the same OCR result without
        re-running Tesseract (CSV #16).
      parameters:
        - $ref: '../_shared/common-headers.yaml#/components/parameters/Traceparent'
        - $ref: '../_shared/common-headers.yaml#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
      responses:
        '200':
          description: Extraction succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
        '409':
          $ref: '../_shared/idempotency.yaml#/components/responses/InFlight'
        '413':
          description: Image / PDF exceeds the configured size ceiling.
          content:
            application/problem+json:
              schema:
                $ref: '../_shared/error-envelope.yaml#/components/schemas/ProblemDetails'
        '422':
          description: |
            Image / PDF is corrupt, unparseable, or the requested
            language pack isn't installed on this build.
          content:
            application/problem+json:
              schema:
                $ref: '../_shared/error-envelope.yaml#/components/schemas/ProblemDetails'
        '429':
          $ref: '../_shared/retry.yaml#/components/responses/TooManyRequests'
        '4XX':
          $ref: '../_shared/error-envelope.yaml#/components/responses/Error'
        '5XX':
          $ref: '../_shared/error-envelope.yaml#/components/responses/Error'

  /v1/capabilities:
    get:
      operationId: getCapabilities
      tags: [meta]
      summary: Service capability advertisement.
      description: |
        Per CSV #21. Returns the supported mime-type families, the
        installed Tesseract language packs, and any feature flags.
      responses:
        '200':
          description: Capabilities for this build.
          content:
            application/json:
              schema:
                $ref: '../_shared/capabilities.yaml#/components/schemas/Capabilities'

  /actuator/health:
    get:
      operationId: getHealth
      tags: [meta]
      summary: Liveness + readiness probe.
      description: |
        Liveness reflects process state; readiness checks the Tesseract
        binary is reachable + MinIO is reachable. Detailed component
        health under `/actuator/health/{component}`.
      security: []
      responses:
        '200':
          description: Up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    ExtractRequest:
      type: object
      required: [documentRef, nodeRunId]
      additionalProperties: false
      properties:
        documentRef:
          type: object
          required: [bucket, objectKey]
          additionalProperties: false
          description: MinIO pointer to the source image / scanned PDF.
          properties:
            bucket:
              type: string
              minLength: 1
              maxLength: 64
            objectKey:
              type: string
              minLength: 1
              maxLength: 1024
            etag:
              type: string
              description: Optional MinIO ETag — verified before OCR if present.
        nodeRunId:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Pipeline-node run id per architecture §6.11. Idempotency
            key (CSV #16).
        mimeType:
          type: string
          description: |
            Caller's hint at the source mime type; service re-detects
            via Tika and uses whichever is more specific.
        languages:
          type: array
          maxItems: 8
          description: |
            Tesseract language codes (ISO 639-2/T) — e.g. `["eng"]`,
            `["eng","fra","deu"]`. Default `["eng"]`. Unsupported
            codes return 422 with code `OCR_LANGUAGE_UNSUPPORTED`.
          items:
            type: string
            minLength: 3
            maxLength: 4
            pattern: '^[a-z]{3,4}$'

    ExtractResponse:
      type: object
      required: [nodeRunId, text, detectedMimeType, costUnits]
      additionalProperties: false
      properties:
        nodeRunId:
          type: string
          description: Echo of the request's nodeRunId.
        text:
          $ref: '../_shared/text-payload.yaml#/components/schemas/TextPayload'
        detectedMimeType:
          type: string
          description: Tika's detected mime type for the source. Authoritative.
          examples:
            - image/png
            - application/pdf
        languages:
          type: array
          description: |
            Languages effectively used by Tesseract (echoes the
            request's `languages`, defaulted to `["eng"]` if absent).
          items: { type: string }
        pageCount:
          type: integer
          minimum: 0
          description: Pages parsed (PDFs); null for single-page images.
        durationMs:
          type: integer
          minimum: 0
          description: End-to-end OCR time, milliseconds.
        costUnits:
          type: integer
          minimum: 0
          description: |
            Cost-attribution unit per CSV #22. For OCR this is byte-count
            of source data parsed, divided by 1024. Zero for cache hits.

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
        components:
          type: object
          additionalProperties: true

  securitySchemes:
    serviceJwt:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/serviceJwt'
