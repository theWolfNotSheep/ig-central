openapi: 3.1.1
info:
  title: ig-central — Error Envelope
  version: 0.1.0
  description: |
    Shared RFC 7807 (`application/problem+json`) error envelope for every
    ig-central service, plus ig-central extensions for retry semantics
    and pipeline-stage attribution.

    Source decision: `version-2-decision-tree.csv` #17.

    Every operation in every service's spec MUST declare this envelope
    as the response for 4xx and 5xx status codes. (A Spectral rule
    enforcing this lands in Phase 0.5 once the first per-service spec
    is in flight.)

paths: {}

components:
  responses:
    Error:
      description: Problem details (RFC 7807) with ig-central extensions.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    ProblemDetails:
      type: object
      description: |
        RFC 7807 problem details with ig-central extension fields. The
        five RFC 7807 fields (`type`, `title`, `status`, `detail`,
        `instance`) plus extension fields (`code`, `lastErrorStage`,
        `retryable`, `retryAfterMs`, `trace[]`).
      required:
        - type
        - title
        - status
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
          description: |
            URI reference identifying the problem type. Stable across
            versions of the emitting service.
          examples:
            - https://errors.ig-central.example/extraction/oom
            - https://errors.ig-central.example/classifier/timeout
        title:
          type: string
          description: |
            Short, human-readable summary of the problem type. Same
            value across occurrences of the same `type`.
          examples:
            - Extraction worker out of memory
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP status code generated by the origin server.
          examples:
            - 503
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
          examples:
            - Document exceeded the 200 MB extraction ceiling.
        instance:
          type: string
          format: uri
          description: |
            URI identifying the specific occurrence. Should include
            enough context for log correlation — typically a request id
            or trace id.
          examples:
            - urn:ig-central:request:01HX2KQ8
        code:
          type: string
          description: |
            Machine-readable error code, stable across services.
            Format: `<DOMAIN>_<SHORT_CODE>` (e.g. `EXTRACTION_OOM`,
            `CLASSIFICATION_TIMEOUT`). The orchestrator may dispatch on
            `code` without parsing `type`.
          examples:
            - EXTRACTION_OOM
            - CLASSIFICATION_TIMEOUT
            - IN_FLIGHT
            - BACKPRESSURE
        lastErrorStage:
          type: string
          description: |
            Identifier of the pipeline stage that produced this error.
            Used by audit (Tier 1 `lastErrorStage` field) and the
            monitoring UI for failure attribution.
          examples:
            - extract.tika.parse
            - classify.router.cascade.bert
        retryable:
          type: boolean
          description: |
            Whether the caller should retry. `false` for permanent
            failures (4xx for malformed input; 422 for unsupported
            MIME); `true` for transient failures (503, 504, 429).
        retryAfterMs:
          type: integer
          format: int64
          minimum: 0
          description: |
            Suggested delay in milliseconds before retry. Mirrors the
            HTTP `Retry-After` header but in millisecond precision.
            Honour this in preference to a fixed backoff.
          examples:
            - 5000
        trace:
          type: array
          description: |
            Optional ordered list of trace steps providing causal
            context. Useful for debugging cascade failures across tier
            boundaries (BERT → SLM → LLM).
          items:
            $ref: '#/components/schemas/ProblemTraceStep'

    ProblemTraceStep:
      type: object
      required:
        - stage
        - timestamp
      properties:
        stage:
          type: string
          description: Pipeline stage identifier.
          examples:
            - classify.router.cascade.bert
        timestamp:
          type: string
          format: date-time
          description: When this step occurred (RFC 3339).
        message:
          type: string
          description: Optional human-readable note for this step.
        durationMs:
          type: integer
          format: int64
          minimum: 0
          description: How long this step took.
