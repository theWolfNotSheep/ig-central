# Base docker-compose — all services including cloudflared tunnel:
#   docker compose up --build -d
#   Requires TUNNEL_TOKEN in .env for cloudflared to connect

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    logging: *default-logging
    networks:
      - gls

  mongo:
    image: mongo:7
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-example}
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - gls

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - gls

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - gls

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - gls

  bert-classifier:
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-bert-classifier
    restart: unless-stopped
    build:
      context: ./bert-classifier
      dockerfile: Dockerfile
    environment:
      BERT_MODEL_DIR: /app/models/default
      BERT_LABEL_MAP: /app/models/default/label_map.json
      BERT_USE_ONNX: "true"
      BERT_MAX_LENGTH: "512"
    volumes:
      - ./data/bert-models:/app/models
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - gls

  api:
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-api
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8080"
      APP_ENV: ${APP_ENV:-DEV}
      PUBLIC_URL: ${PUBLIC_URL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.office365.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@governanceledstore.co.uk}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      GIT_HUB_CLIENT_ID: ${GIT_HUB_CLIENT_ID:-}
      GIT_HUB_CLIENT_SECRET: ${GIT_HUB_CLIENT_SECRET:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-gls-documents}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # Google OAuth, Hub connection, and LLM config come from Settings UI (app_config in MongoDB)
      # These are fallback defaults only
      # Hub runs as a separate stack — point at its public URL (override via Settings UI)
      GOVERNANCE_HUB_URL: ${GOVERNANCE_HUB_URL:-https://hub.igcentral.com}
      GOVERNANCE_HUB_API_KEY: ""
      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      GOOGLE_OAUTH_REDIRECT_URI: ${PUBLIC_URL}/api/drives/google/callback
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PIPELINE_BERT_SERVICE_URL: http://bert-classifier:8000
      LLM_SERVICE_URL: http://llm-worker:8082
      LLM_TIMEOUT_MS: "300000"
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/info"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging
    networks:
      - gls

  mcp-server:
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-mcp-server
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8081"
      PIPELINE_API_BASE_URL: http://api:8080
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/info"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - gls

  llm-worker:
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-llm-worker
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.llm
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8082"
      # LLM config comes from Settings UI (app_config in MongoDB)
      # These are fallback defaults only — used if no config exists in DB
      ANTHROPIC_API_KEY: ""
      LLM_PROVIDER: anthropic
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:32b
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MCP_SERVER_URL: http://mcp-server:8081
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-gls-documents}
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - gls

  web:
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-web
    restart: unless-stopped
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        BACKEND_BASE_URL: http://api:8080
        NEXT_PUBLIC_APP_ENV: ${APP_ENV:-DEV}
    environment:
      BACKEND_BASE_URL: http://api:8080
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - gls

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    logging: *default-logging
    networks:
      - gls

  # ── Governance Hub ──────────────────────────────────────
  # The hub runs as a standalone stack on its own network.
  # See hub/docker-compose.yml and hub/README.md.

  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - gls

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gls}-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - gls

volumes:
  grafana_data:

networks:
  gls:
    driver: bridge
