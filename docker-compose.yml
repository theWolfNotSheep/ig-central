  #     RABBITMQ_HOST: rabbitmq
  #     # Tier 1 / Tier 2 backends are wired here when 0.7 / 1.12 land.
  #   depends_on:
  #     mongo: { condition: service_healthy }
  #     rabbitmq: { condition: service_healthy }
  #   logging: *default-logging
  #   networks: [igc]

volumes:
  grafana_data:

networks:
  igc:
    driver: bridge
