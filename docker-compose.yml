# Base docker-compose — all services including cloudflared tunnel:
#   docker compose up --build -d
#   Requires TUNNEL_TOKEN in .env for cloudflared to connect

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    logging: *default-logging
    networks:
      - igc

  mongo:
    image: mongo:7
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-example}
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - igc

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./data/minio:/data
    ports:
      - "9006:9000"
      - "9007:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - igc

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9203:9200"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - igc

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      # LLM classification calls can take several minutes; disable consumer delivery ACK timeout
      # to prevent RabbitMQ from killing channels mid-classification.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 3600000"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    ports:
      - "15675:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - igc

  bert-classifier:
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-bert-classifier
    restart: unless-stopped
    build:
      context: ./bert-classifier
      dockerfile: Dockerfile
    environment:
      BERT_MODEL_DIR: /app/models/default
      BERT_LABEL_MAP: /app/models/default/label_map.json
      BERT_USE_ONNX: "true"
      BERT_MAX_LENGTH: "256"
    deploy:
      resources:
        limits:
          memory: 4g
    volumes:
      - ./data/bert-models:/app/models
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - igc

  api:
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-api
    restart: unless-stopped
    build:
      # Repo-root context so the build can reach contracts/ —
      # igc-platform-audit bundles the audit envelope schema from
      # contracts/audit/ at build time, and that resource path goes up
      # two levels from the module's pom.
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8080"
      APP_ENV: ${APP_ENV:-DEV}
      PUBLIC_URL: ${PUBLIC_URL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.office365.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@governanceledstore.co.uk}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      GIT_HUB_CLIENT_ID: ${GIT_HUB_CLIENT_ID:-}
      GIT_HUB_CLIENT_SECRET: ${GIT_HUB_CLIENT_SECRET:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-igc-documents}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # Google OAuth, Hub connection, and LLM config come from Settings UI (app_config in MongoDB)
      # These are fallback defaults only
      # Hub runs as a separate stack — point at its public URL (override via Settings UI)
      GOVERNANCE_HUB_URL: ${GOVERNANCE_HUB_URL:-https://hub.igcentral.com}
      GOVERNANCE_HUB_API_KEY: ""
      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      GOOGLE_OAUTH_REDIRECT_URI: ${PUBLIC_URL}/api/drives/google/callback
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PIPELINE_BERT_SERVICE_URL: http://bert-classifier:8000
      LLM_SERVICE_URL: http://llm-worker:8082
      LLM_TIMEOUT_MS: "300000"
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/info"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging
    networks:
      - igc

  mcp-server:
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-mcp-server
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.mcp
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8081"
      PIPELINE_API_BASE_URL: http://api:8080
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/info"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - igc

  llm-worker:
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-llm-orchestration
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.llm
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SERVER_PORT: "8082"
      # LLM config comes from Settings UI (app_config in MongoDB)
      # These are fallback defaults only — used if no config exists in DB
      ANTHROPIC_API_KEY: ""
      LLM_PROVIDER: anthropic
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:32b
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MCP_SERVER_URL: http://mcp-server:8081
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-igc-documents}
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - igc

  web:
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-web
    restart: unless-stopped
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        BACKEND_BASE_URL: http://api:8080
        NEXT_PUBLIC_APP_ENV: ${APP_ENV:-DEV}
    environment:
      BACKEND_BASE_URL: http://api:8080
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - igc

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    logging: *default-logging
    networks:
      - igc

  # ── Governance Hub ──────────────────────────────────────
  # The hub runs as a standalone stack on its own network.
  # See hub/docker-compose.yml and hub/README.md.

  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    networks:
      - igc

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - igc

  # ====================================================================
  # v2 Phase 1+ services — placeholders.
  #
  # These are the services that land as the v2 cutover progresses. Each
  # block stays commented out until its phase begins; uncomment + fill in
  # when the corresponding `igc-<service>/` Maven module + Dockerfile
  # exists. The shape below is the cloneable pattern from
  # `docs/service-template.md` (lands with Phase 0.5 reference impl).
  # See `version-2-implementation-plan.md` for phase ownership.
  # ====================================================================

  # igc-extraction-tika:                                  # Phase 0.5
  #   container_name: ${COMPOSE_PROJECT_NAME:-igc}-extraction-tika
  #   restart: unless-stopped
  #   build:
  #     # Repo-root context so the build can reach contracts/ — the
  #     # igc-platform-audit Maven module bundles the audit envelope
  #     # schema from contracts/audit/ at build time.
  #     context: .
  #     dockerfile: backend/igc-extraction-tika/Dockerfile
  #   environment:
  #     SPRING_PROFILES_ACTIVE: docker
  #     MINIO_ENDPOINT: http://minio:9000
  #     MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  #     MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  #     # Tika service is currently stateless — no Mongo / Rabbit needs
  #     # until idempotency + audit emission land. Add them then.
  #   depends_on:
  #     minio: { condition: service_healthy }
  #   logging: *default-logging
  #   networks: [igc]

  igc-extraction-archive:                                 # Phase 1.1
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-extraction-archive
    restart: unless-stopped
    build:
      # Repo-root context (see Tika block above) so contracts/ is reachable.
      context: .
      dockerfile: backend/igc-extraction-archive/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      IGC_ARCHIVE_SINK_BUCKET: ${IGC_ARCHIVE_SINK_BUCKET:-igc-archive-children}
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-extraction-ocr:                                     # Phase 1.1
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-extraction-ocr
    restart: unless-stopped
    build:
      # Repo-root context. OCR_LANGUAGES build-arg can be set via
      # `docker compose build --build-arg OCR_LANGUAGES="eng fra deu"`.
      context: .
      dockerfile: backend/igc-extraction-ocr/Dockerfile
      args:
        OCR_LANGUAGES: ${OCR_LANGUAGES:-eng}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      IGC_OCR_SINK_BUCKET: ${IGC_OCR_SINK_BUCKET:-igc-ocr-text}
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-extraction-audio:                                   # Phase 1.1
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-extraction-audio
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-extraction-audio/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      IGC_AUDIO_PROVIDER: ${IGC_AUDIO_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      IGC_AUDIO_SINK_BUCKET: ${IGC_AUDIO_SINK_BUCKET:-igc-audio-text}
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-classifier-router:                                  # Phase 1.2
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-classifier-router
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-classifier-router/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # Cascade tier feature flags. Default off — flip to true once
      # the targeted worker is reachable.
      IGC_ROUTER_BERT_ENABLED: ${IGC_ROUTER_BERT_ENABLED:-false}
      IGC_ROUTER_BERT_URL: http://igc-bert-inference:8094
      IGC_ROUTER_SLM_ENABLED: ${IGC_ROUTER_SLM_ENABLED:-false}
      IGC_ROUTER_SLM_URL: http://igc-slm-worker:8095
      # Legacy Rabbit-based LLM dispatch (igc-llm-orchestration).
      # Phase 1.6 PR3 introduced an HTTP path; flip IGC_ROUTER_LLM_HTTP_ENABLED
      # to use it. When both are on, HTTP wins.
      IGC_ROUTER_LLM_ENABLED: ${IGC_ROUTER_LLM_ENABLED:-false}
      IGC_ROUTER_LLM_HTTP_ENABLED: ${IGC_ROUTER_LLM_HTTP_ENABLED:-false}
      IGC_ROUTER_LLM_HTTP_URL: http://igc-llm-worker:8096
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-bert-inference:                                     # Phase 1.4
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-bert-inference
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-bert-inference/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # platform-audit auto-configures Mongo whenever MongoTemplate is on
      # the classpath; bert-inference doesn't use it but Spring still
      # tries to connect on boot. Point at the compose-network mongo.
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      # Default: stub backend that returns MODEL_NOT_LOADED 503.
      # Flip IGC_BERT_ENGINE to `djl` once the trainer publishes its
      # first ONNX artefact + the engine wires in.
      IGC_BERT_ENGINE: ${IGC_BERT_ENGINE:-none}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      IGC_BERT_ARTIFACTS_BUCKET: ${IGC_BERT_ARTIFACTS_BUCKET:-igc-bert-artifacts}
    depends_on:
      mongo: { condition: service_healthy }
      minio: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-slm-worker:                                         # Phase 1.5
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-slm-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-slm-worker/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      # Default: stub backend that returns SLM_NOT_CONFIGURED 503.
      # Flip IGC_SLM_BACKEND to `anthropic` (with ANTHROPIC_API_KEY)
      # or `ollama` (with OLLAMA_BASE_URL) to enable real classification.
      IGC_SLM_BACKEND: ${IGC_SLM_BACKEND:-none}
      SPRING_AI_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPRING_AI_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      IGC_SLM_ANTHROPIC_MODEL: ${IGC_SLM_ANTHROPIC_MODEL:-claude-haiku-4-5}
      IGC_SLM_OLLAMA_MODEL: ${IGC_SLM_OLLAMA_MODEL:-llama3.1:8b}
      IGC_MCP_SERVER_URL: http://mcp-server:8081
    depends_on:
      mongo: { condition: service_healthy }
      mcp-server: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-llm-worker:                                         # Phase 1.6
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-llm-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-llm-worker/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      # Default: stub backend that returns LLM_NOT_CONFIGURED 503.
      # Flip IGC_LLM_BACKEND to `anthropic` (with ANTHROPIC_API_KEY)
      # or `ollama` (with OLLAMA_BASE_URL) to enable real classification.
      IGC_LLM_BACKEND: ${IGC_LLM_BACKEND:-none}
      SPRING_AI_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPRING_AI_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      IGC_LLM_ANTHROPIC_MODEL: ${IGC_LLM_ANTHROPIC_MODEL:-claude-sonnet-4-5}
      IGC_LLM_OLLAMA_MODEL: ${IGC_LLM_OLLAMA_MODEL:-qwen2.5:32b}
      IGC_MCP_SERVER_URL: http://mcp-server:8081
      # Cost budget + rate limit defaults are 0 (disabled). Tune via
      # IGC_LLM_BUDGET_DAILY_TOKEN_CAP / IGC_LLM_RATE_LIMIT_PERMITS.
      IGC_LLM_BUDGET_DAILY_TOKEN_CAP: ${IGC_LLM_BUDGET_DAILY_TOKEN_CAP:-0}
      IGC_LLM_RATE_LIMIT_PERMITS: ${IGC_LLM_RATE_LIMIT_PERMITS:-0}
      IGC_LLM_RATE_LIMIT_WAIT_MS: ${IGC_LLM_RATE_LIMIT_WAIT_MS:-0}
    depends_on:
      mongo: { condition: service_healthy }
      mcp-server: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-enforcement-worker:                                 # Phase 1.10
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-enforcement-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-governance-enforcement/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-igc-documents}
      # The HTTP worker is the new entry point (Phase 1.10 PR3 will
      # cut the orchestrator over to it). Disable the legacy in-process
      # Rabbit consumer in this container so it doesn't double-process
      # the classified queue alongside the api/execution-engine path.
      # The consumer is `@ConditionalOnProperty(... matchIfMissing=true,
      # havingValue=false)` — set the flag to `true` to disable it.
      PIPELINE_EXECUTION_ENGINE_ENABLED: "true"
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-indexing-worker:                                    # Phase 1.11
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-indexing-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-indexing-worker/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  igc-audit-collector:                                    # Phase 1.12
    container_name: ${COMPOSE_PROJECT_NAME:-igc}-audit-collector
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/igc-audit-collector/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-example}@mongo:27017/${MONGO_DB_NAME:-governance_led_storage_main}?authSource=admin
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      # Tier 2 backend (Phase 1.12 PR3): `mongo` (default) or `es`.
      # Flip to `es` once the audit_tier2_events ES index is wired
      # for ILM in production. Mongo remains the safe default until
      # ES indexing is observed.
      IGC_AUDIT_TIER2_BACKEND: ${IGC_AUDIT_TIER2_BACKEND:-mongo}
    depends_on:
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    logging: *default-logging
    networks: [igc]

  # (igc-classifier-router placeholder removed — active block is below.)

  # igc-audit-collector:                                  # Phase 1.12 / 0.7 follow-up
