# Production hardening — rate limiting zones and security headers.
# Loaded alongside default.conf by nginx (conf.d/*.conf).
#
# Rate limit zones (defined at http level, applied in default.conf location blocks):
#   - login: 5 requests/minute per IP
#   - upload: ~100 requests/hour per IP (2 req/min)

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/m;
