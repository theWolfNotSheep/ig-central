# Pre-commit hooks for ig-central.
# https://pre-commit.com
#
# Install once:    pre-commit install
# Run manually:    pre-commit run --all-files
# Update versions: pre-commit autoupdate

repos:
  - repo: local
    hooks:
      - id: spectral-contracts
        name: Spectral lint (OpenAPI 3.1.1 / contracts/)
        description: |
          Lints any YAML under contracts/ against the project's Spectral
          ruleset. Per CSV #40 (start permissive, tighten over time).
        entry: npx --yes @stoplight/spectral-cli@6 lint --ruleset contracts/.spectral.yaml --fail-severity error
        language: system
        files: '^contracts/.*\.(yaml|yml)$'
        exclude: '^contracts/\.spectral\.yaml$'
        pass_filenames: true
