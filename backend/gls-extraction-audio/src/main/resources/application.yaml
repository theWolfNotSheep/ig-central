spring:
  application:
    name: gls-extraction-audio

server:
  port: 8092

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

gls:
  extraction:
    audio:
      provider: ${GLS_AUDIO_PROVIDER:none}
      sink:
        bucket: ${GLS_AUDIO_SINK_BUCKET:gls-audio-text}
      jobs:
        ttl: ${GLS_AUDIO_JOBS_TTL:PT24H}
      inline-byte-ceiling: ${GLS_AUDIO_INLINE_BYTE_CEILING:262144}
      max-source-bytes: ${GLS_AUDIO_MAX_SOURCE_BYTES:524288000}
      async:
        core-size: ${GLS_AUDIO_ASYNC_CORE:4}
        max-size: ${GLS_AUDIO_ASYNC_MAX:8}
        queue-capacity: ${GLS_AUDIO_ASYNC_QUEUE:32}
      openai:
        api-key: ${OPENAI_API_KEY:}
        endpoint: ${OPENAI_AUDIO_ENDPOINT:https://api.openai.com/v1/audio/transcriptions}
        model: ${OPENAI_AUDIO_MODEL:whisper-1}
        timeout: ${OPENAI_AUDIO_TIMEOUT:PT10M}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
