spring:
  application:
    name: gls-slm-worker

server:
  port: 8095

gls:
  slm:
    worker:
      # `none` (default) → NotConfiguredSlmService; every /v1/classify
      # returns 503 SLM_NOT_CONFIGURED. `anthropic` and `ollama`
      # (Phase 1.5 follow-ups) wire real backends.
      backend: ${GLS_SLM_BACKEND:none}
      jobs:
        ttl: ${GLS_SLM_JOBS_TTL:PT24H}
      async:
        core-size: ${GLS_SLM_ASYNC_CORE:4}
        max-size: ${GLS_SLM_ASYNC_MAX:8}
        queue-capacity: ${GLS_SLM_ASYNC_QUEUE:32}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
