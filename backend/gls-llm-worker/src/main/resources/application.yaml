spring:
  application:
    name: gls-llm-worker

  ai:
    # MCP client — connects to gls-mcp-server over SSE per CSV #1.
    mcp:
      client:
        type: SYNC
        sse:
          connections:
            governance:
              url: ${GLS_MCP_SERVER_URL:http://gls-mcp-server:8081}

server:
  port: 8096

gls:
  llm:
    worker:
      # `none` (default) → NotConfiguredLlmService; every /v1/classify
      # returns 503 LLM_NOT_CONFIGURED.
      # `anthropic` → AnthropicLlmService (defaults to claude-sonnet-4-5).
      #   Requires ANTHROPIC_API_KEY.
      # `ollama` → OllamaLlmService (defaults to qwen2.5:32b).
      #   Requires spring.ai.ollama.base-url.
      backend: ${GLS_LLM_BACKEND:none}
      anthropic:
        model: ${GLS_LLM_ANTHROPIC_MODEL:claude-sonnet-4-5}
        temperature: ${GLS_LLM_ANTHROPIC_TEMPERATURE:0.1}
        max-tokens: ${GLS_LLM_ANTHROPIC_MAX_TOKENS:4096}
      ollama:
        model: ${GLS_LLM_OLLAMA_MODEL:qwen2.5:32b}
        temperature: ${GLS_LLM_OLLAMA_TEMPERATURE:0.1}
        num-ctx: ${GLS_LLM_OLLAMA_NUM_CTX:32768}
      jobs:
        ttl: ${GLS_LLM_JOBS_TTL:PT24H}
      async:
        core-size: ${GLS_LLM_ASYNC_CORE:4}
        max-size: ${GLS_LLM_ASYNC_MAX:8}
        queue-capacity: ${GLS_LLM_ASYNC_QUEUE:32}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
