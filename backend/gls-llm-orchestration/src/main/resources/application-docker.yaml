spring:
  rabbitmq:
    host: rabbitmq
    port: 5672
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5
        prefetch: 1
  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
    mcp:
      client:
        sse:
          connections:
            governance:
              url: http://mcp-server:8081

pipeline:
  api-base-url: http://api:8080
