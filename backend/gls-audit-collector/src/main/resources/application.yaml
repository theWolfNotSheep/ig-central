spring:
  application:
    name: gls-audit-collector

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:${MONGO_PASSWORD:example}@localhost:27017/${MONGO_DB_NAME:governance_led_storage_main}?authSource=admin}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

server:
  port: ${GLS_AUDIT_COLLECTOR_PORT:8099}

# The collector consumes only — it must NOT run the platform-audit
# outbox relay (which is a publisher concern). Disable it explicitly
# so this container doesn't end up double-emitting events it just
# consumed and republished into its own outbox.
gls:
  platform:
    audit:
      relay:
        enabled: false
  audit:
    collector:
      # Tier 1 storage backend selection per Phase 1.12 PR4.
      # `mongo` (default) — AppendOnlyMongoTier1Store, audit_tier1_events
      # collection with app-layer append-only enforcement (the interface
      # exposes only append + reads; re-appending an existing eventId
      # throws AppendOnlyViolationException, which the consumer treats
      # as an idempotent no-op). Operators should also enforce at the
      # datastore layer by granting only `insert` + `find` on this
      # collection to the collector's Mongo service account; deny
      # `update`, `delete`, `dropCollection`, and `renameCollectionSameDB`.
      # Future PRs may add an `s3-object-lock` implementation behind the
      # same interface.
      tier1-backend: ${GLS_AUDIT_TIER1_BACKEND:mongo}
      # Tier 2 storage backend selection per Phase 1.12 PR3.
      # `mongo` (default) — MongoTier2Store, audit_tier2_events collection.
      # `es` — EsTier2Store, audit_tier2_events index on the existing
      # spring.elasticsearch.uris cluster. Indices auto-created on first
      # write with `dynamic: true` mappings.
      tier2-backend: ${GLS_AUDIT_TIER2_BACKEND:mongo}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
