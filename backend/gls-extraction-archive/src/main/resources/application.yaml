spring:
  application:
    name: gls-extraction-archive

server:
  port: 8090

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

gls:
  extraction:
    archive:
      sink:
        bucket: ${GLS_ARCHIVE_SINK_BUCKET:gls-archive-children}
      idempotency:
        ttl: ${GLS_ARCHIVE_IDEMPOTENCY_TTL:PT24H}
      caps:
        max-archive-bytes: ${GLS_ARCHIVE_MAX_ARCHIVE_BYTES:1073741824}
        max-children: ${GLS_ARCHIVE_MAX_CHILDREN:5000}
        max-child-bytes: ${GLS_ARCHIVE_MAX_CHILD_BYTES:268435456}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
    org.apache.tika: WARN
    org.apache.commons.compress: WARN
