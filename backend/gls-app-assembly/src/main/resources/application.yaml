governance-hub:
  url: ${GOVERNANCE_HUB_URL:http://localhost:8090}
  api-key: ${GOVERNANCE_HUB_API_KEY:}

public:
  url: ${PUBLIC_URL:http://localhost}
frontend:
  url: ${PUBLIC_URL:http://localhost}
backend:
  base-url: ${BACKEND_BASE_URL:http://localhost:8080}
app:
  admin:
    email: ${ADMIN_EMAIL:admin@governanceledstore.co.uk}
    password: ${ADMIN_PASSWORD:ChangeMe123!}
  environment: ${APP_ENV:DEV}
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: governance-led-storage-backend
    jwtSecret: ${JWT_SECRET:mkj1e8TsWXIWmXHMmJAli53oxkDnK28pUIX/n1wI56ChWswdcpNHpVSsirKbgNGbSr6ItJFXLDyIkviadCTJtA==}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:172800000}
  data:
    mongodb:
      auto-index-creation: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
  autoconfigure:
    exclude:
      - ${EXCLUDE_OAUTH2:org.springframework.boot.security.oauth2.client.autoconfigure.OAuth2ClientAutoConfiguration}
  servlet:
    multipart:
      enabled: true
      max-file-size: 110MB
      max-request-size: 120MB
      file-size-threshold: 2KB
  mail:
    host: ${EMAIL_SMTP_HOST:smtp.office365.com}
    port: ${EMAIL_SMTP_PORT:587}
    username: ${EMAIL_ADDRESS}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    protocol: smtp
  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://root:example@localhost:27017/governance_led_storage_main?authSource=admin}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    socket-timeout: 30s
    connection-timeout: 10s

mongock:
  enabled: ${MONGOCK_ENABLED:true}
  migration-scan-package:
    - co.uk.wolfnotsheep.infrastructure.migrations
  transaction-enabled: false
  runner-type: InitializingBean
  track-ignored: false

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${PUBLIC_URL:http://localhost}/api/drives/google/callback

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:gls-documents}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    mongo:
      enabled: true
    mail:
      enabled: false
    diskspace:
      enabled: true

monitoring:
  # The doc-processor and governance-enforcer modules are bundled into the `api` container
  # — they no longer run as separate services. BERT classifier is monitored via the
  # @Value default at index 3 in MonitoringService.
  services:
    - name: api
      url: http://localhost:8080/actuator/health
    - name: mcp-server
      url: ${MCP_SERVER_HEALTH:http://localhost:8081/actuator/health}
    - name: llm-worker
      url: ${LLM_WORKER_HEALTH:http://localhost:8082/actuator/health}
  rabbitmq-management-url: http://${RABBITMQ_HOST:localhost}:15672/api
  health-check-timeout-ms: 3000

pipeline:
  execution-engine:
    enabled: true
  bert:
    service-url: ${PIPELINE_BERT_SERVICE_URL:http://localhost:8000}
  llm:
    service-url: ${LLM_SERVICE_URL:http://localhost:8082}
    timeout-ms: ${LLM_TIMEOUT_MS:300000}
  classifier-router:
    # Phase 1.3 cutover. When true, the engine calls
    # gls-classifier-router synchronously instead of publishing
    # LlmJobRequestedEvent to Rabbit. The router internally
    # dispatches via the existing LLM worker — same model call,
    # different transport. Default false so the legacy async path
    # remains primary; flip to true to roll forward.
    enabled: ${PIPELINE_CLASSIFIER_ROUTER_ENABLED:false}
    url: ${PIPELINE_CLASSIFIER_ROUTER_URL:http://gls-classifier-router:8080}
    timeout-ms: ${PIPELINE_CLASSIFIER_ROUTER_TIMEOUT_MS:90000}
  indexing-worker:
    # Phase 1.11 PR3 cutover. When true, the legacy
    # ElasticsearchIndexService dispatches every public write
    # (indexDocument / removeDocument / reindexAll) to
    # gls-indexing-worker over HTTP instead of writing to ES
    # in-process. The worker reuses the same IndexingService
    # internally — transport swap, no behavioural change. Default
    # false so the legacy in-process path stays primary; flip to
    # true to roll forward.
    enabled: ${PIPELINE_INDEXING_WORKER_ENABLED:false}
    url: ${PIPELINE_INDEXING_WORKER_URL:http://gls-indexing-worker:8098}
    timeout-ms: ${PIPELINE_INDEXING_WORKER_TIMEOUT_MS:30000}
  enforcement-worker:
    # Phase 1.10 PR3 cutover. When true, the engine calls
    # gls-enforcement-worker synchronously over HTTP instead of
    # invoking the in-process EnforcementService. The worker writes
    # the document to Mongo before responding; the engine re-fetches
    # to apply per-node toggle clearing + status routing. Default
    # false so the legacy in-process path remains primary; flip to
    # true to roll forward.
    enabled: ${PIPELINE_ENFORCEMENT_WORKER_ENABLED:false}
    url: ${PIPELINE_ENFORCEMENT_WORKER_URL:http://gls-enforcement-worker:8097}
    timeout-ms: ${PIPELINE_ENFORCEMENT_WORKER_TIMEOUT_MS:60000}

logging:
  level:
    co.uk.wolfnotsheep: TRACE
    org.springframework.security: TRACE
    org.springframework.web.cors: TRACE
