spring:
  application:
    name: igc-slm-worker

  ai:
    # MCP client — connects to igc-mcp-server over SSE per CSV #1
    # ("each worker calls MCP itself"). The starter auto-configures
    # one ToolCallbackProvider bean per declared connection; the
    # backends inject them and pass them to the ChatClient builder.
    # When the MCP server is unreachable the starter logs a warning
    # and registers no tools — the SLM call still works without them.
    mcp:
      client:
        type: SYNC
        sse:
          connections:
            governance:
              url: ${IGC_MCP_SERVER_URL:http://igc-mcp-server:8081}

server:
  port: 8095

igc:
  slm:
    worker:
      # `none` (default) → NotConfiguredSlmService; every /v1/classify
      # returns 503 SLM_NOT_CONFIGURED.
      # `anthropic` (Phase 1.5 PR2) → AnthropicHaikuSlmService.
      # Requires ANTHROPIC_API_KEY.
      # `ollama` (Phase 1.5 PR4) → OllamaSlmService. Requires
      # spring.ai.ollama.base-url pointing at a reachable Ollama
      # instance (default the starter sets is http://localhost:11434).
      backend: ${IGC_SLM_BACKEND:none}
      anthropic:
        model: ${IGC_SLM_ANTHROPIC_MODEL:claude-haiku-4-5}
        temperature: ${IGC_SLM_ANTHROPIC_TEMPERATURE:0.1}
        max-tokens: ${IGC_SLM_ANTHROPIC_MAX_TOKENS:1024}
      ollama:
        model: ${IGC_SLM_OLLAMA_MODEL:llama3.1:8b}
        temperature: ${IGC_SLM_OLLAMA_TEMPERATURE:0.1}
        num-ctx: ${IGC_SLM_OLLAMA_NUM_CTX:32768}
      jobs:
        ttl: ${IGC_SLM_JOBS_TTL:PT24H}
      async:
        core-size: ${IGC_SLM_ASYNC_CORE:4}
        max-size: ${IGC_SLM_ASYNC_MAX:8}
        queue-capacity: ${IGC_SLM_ASYNC_QUEUE:32}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
