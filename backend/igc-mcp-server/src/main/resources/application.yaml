server:
  port: 8081

spring:
  application:
    name: igc-mcp-server
  mongodb:
    uri: mongodb://root:${MONGO_PASSWORD:example}@localhost:27017/${MONGO_DB_NAME:governance_led_storage_main}?authSource=admin
  ai:
    mcp:
      server:
        name: igc-governance-mcp
        version: 0.1.0
        type: SYNC
        annotation-scanner:
          enabled: true

pipeline:
  api-base-url: ${PIPELINE_API_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: info,health
