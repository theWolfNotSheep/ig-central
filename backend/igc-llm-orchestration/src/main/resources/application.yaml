server:
  port: 8082

spring:
  application:
    name: igc-llm-orchestration

  mongodb:
    uri: mongodb://root:${MONGO_PASSWORD:example}@localhost:27017/${MONGO_DB_NAME:governance_led_storage_main}?authSource=admin

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
          max-tokens: ${LLM_MAX_TOKENS:4096}
          temperature: ${LLM_TEMPERATURE:0.1}

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5:32b}
        options:
          temperature: ${LLM_TEMPERATURE:0.1}
          num-ctx: ${OLLAMA_CTX_SIZE:32768}

    # MCP client — connects to the governance MCP server over SSE
    mcp:
      client:
        type: SYNC
        sse:
          connections:
            governance:
              url: ${MCP_SERVER_URL:http://localhost:8081}

# LLM provider selection: "anthropic" or "ollama"
llm:
  provider: ${LLM_PROVIDER:anthropic}

logging:
  level:
    org.springframework.ai.model.tool: DEBUG
    org.springframework.ai.chat.client: DEBUG
    org.springframework.ai.mcp: DEBUG


minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:igc-documents}

management:
  endpoints:
    web:
      exposure:
        include: info,health
