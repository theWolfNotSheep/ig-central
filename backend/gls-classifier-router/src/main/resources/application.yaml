spring:
  application:
    name: gls-classifier-router

server:
  port: 8093

gls:
  router:
    idempotency:
      ttl: ${GLS_ROUTER_IDEMPOTENCY_TTL:PT24H}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
