spring:
  application:
    name: gls-bert-inference

server:
  port: 8094

gls:
  bert:
    inference:
      # `none` (default) → NotLoadedInferenceEngine; every /v1/infer
      # returns 503 MODEL_NOT_LOADED. `djl` (Phase 1.4 follow-up) wires
      # the real DJL + ONNX Runtime engine.
      engine: ${GLS_BERT_ENGINE:none}
      minio:
        endpoint: ${MINIO_ENDPOINT:http://minio:9000}
        access-key: ${MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${MINIO_SECRET_KEY:minioadmin}
        bucket: ${GLS_BERT_ARTIFACTS_BUCKET:gls-bert-artifacts}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
    ai.djl: WARN
