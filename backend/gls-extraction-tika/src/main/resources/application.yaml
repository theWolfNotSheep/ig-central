spring:
  application:
    name: gls-extraction-tika

server:
  port: 8080

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

gls:
  extraction:
    tika:
      max-characters: ${GLS_EXTRACTION_TIKA_MAX_CHARS:500000}
      # Inline-vs-textRef threshold per CSV #19. Bytes above this go to MinIO sink (sink lands in a follow-up PR).
      inline-byte-ceiling: ${GLS_EXTRACTION_INLINE_BYTE_CEILING:262144}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
    org.apache.tika: WARN
