server:
  port: 8083

spring:
  application:
    name: igc-document-processing

  mongodb:
    uri: mongodb://root:${MONGO_PASSWORD:example}@localhost:27017/${MONGO_DB_NAME:governance_led_storage_main}?authSource=admin

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:igc-documents}

pipeline:
  execution-engine:
    enabled: ${PIPELINE_EXECUTION_ENGINE_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: info,health
