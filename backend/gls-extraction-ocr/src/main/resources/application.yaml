spring:
  application:
    name: gls-extraction-ocr

server:
  port: 8091

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

gls:
  extraction:
    ocr:
      sink:
        bucket: ${GLS_OCR_SINK_BUCKET:gls-ocr-text}
      idempotency:
        ttl: ${GLS_OCR_IDEMPOTENCY_TTL:PT24H}
      inline-byte-ceiling: ${GLS_OCR_INLINE_BYTE_CEILING:262144}
      max-source-bytes: ${GLS_OCR_MAX_SOURCE_BYTES:268435456}
      tessdata-path: ${TESSDATA_PREFIX:/usr/share/tesseract-ocr/4.00/tessdata}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    co.uk.wolfnotsheep: INFO
    net.sourceforge.tess4j: WARN
